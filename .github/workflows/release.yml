name: Release

# Manually triggered from the Actions tab. Bumps the version on a short-lived
# branch and opens a pull request — it does NOT push to main or create a tag.
#
# Merging that PR lands the bump on main through the normal (branch-protected)
# path; the `tag-on-merge` workflow then creates and pushes the vX.Y.Z tag, and
# that tag push triggers the CD workflow, which publishes to npm.
#
# The branch push and PR are made with a fine-grained PAT (secret RELEASE_TOKEN)
# rather than the default GITHUB_TOKEN: a PR opened by GITHUB_TOKEN does NOT
# trigger the `pull_request` CI workflow, so CI would never run on the release PR.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  bump:
    name: open version-bump PR
    if: github.repository == 'charles-turner-1/cftime-ts'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }} # PAT so CI runs on the opened PR

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail before opening a PR, so a broken tree never becomes a release candidate.
      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version on a release branch
        id: bump
        # --no-git-tag-version bumps package.json + package-lock.json only: no commit,
        # no tag. We make the commit ourselves on a dedicated branch.
        run: |
          NEW_VERSION="$(npm version "${{ inputs.bump }}" --no-git-tag-version)"
          NEW_VERSION="${NEW_VERSION#v}"
          BRANCH="release/v${NEW_VERSION}"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          git switch -c "${BRANCH}"
          git commit -am "Release v${NEW_VERSION}"
          git push --force-with-lease origin "${BRANCH}"

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.bump.outputs.branch }}" \
            --title "Release v${{ steps.bump.outputs.version }}" \
            --body "Automated version bump to \`v${{ steps.bump.outputs.version }}\`. Merging this PR publishes the release: the \`tag-on-merge\` workflow tags the merged commit and CD publishes to npm."
