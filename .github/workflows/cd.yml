name: CD

on:
  push:
    tags: ["v*"]

jobs:
  npm:
    name: publish to npm
    # Publish only from the canonical repo — never forks.
    if: github.repository == 'charles-turner-1/cftime-ts'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC: npm trusted publishing (+ automatic provenance)
      contents: read

    steps:
      - name: Checkout tag
        # A tag push checks out the tagged commit by default.
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Update npm
        # Trusted publishing requires a recent npm.
        run: npm install -g npm@latest

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build distributions
        run: npm run build

      - name: Check package surface
        # After build so this validates the emitted dist/*.d.ts, not just src/.
        run: npm run check:package

      - name: Verify packed package
        run: npm pack --dry-run

      - name: Publish package to npm
        # Provenance is attached automatically when publishing via OIDC.
        run: npm publish --access public --provenance
